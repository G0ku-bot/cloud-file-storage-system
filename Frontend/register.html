<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Cloud Storage</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

<div class="background">
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<div class="login-box">
    <h2>Create Account </h2>
    <p>Start storing your files securely</p>

    <form>
        <div class="input-box">
            <input type="text" required>
            <label>Full Name</label>
        </div>

        <div class="input-box">
            <input type="email" required>
            <label>Email</label>
        </div>

       <div class="input-box">
    <input type="password" id="password" required>
    <label>Password</label>
    <span class="toggle" onclick="togglePassword()">👁</span>
</div>

        <div class="input-box">
    <input type="password" id="confirmPassword" required>
    <label>Confirm Password</label>
    <span class="toggle" onclick="toggleConfirmPassword()">👁</span>
</div>

        <button type="submit">Register</button>

        <p class="signup-text">
            Already have an account? <a href="index.html">Login</a>
        </p>
    </form>
</div>

<script>
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function toggleConfirmPassword() {
    let pass = document.getElementById("confirmPassword");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
