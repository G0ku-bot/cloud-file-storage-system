<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Cloud Storage</title>
    <link rel="stylesheet" href="css/style.css">


<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">


</head>
<body class="auth-page">

<div class="background">
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<div class="login-box">
    <h2>Create Account</h2>
    <p>Start storing your files securely</p>

<form id="registerForm">
    <div class="input-box">
        <input type="text" id="name" required>
        <label>Full Name</label>
    </div>

    <div class="input-box">
        <input type="email" id="email" required>
        <label>Email</label>
    </div>

    <div class="input-box">
        <input type="password" id="password" required>
        <label>Password</label>
        <span class="toggle" onclick="togglePassword()">👁</span>
    </div>

    <div class="input-box">
        <input type="password" id="confirmPassword" required>
        <label>Confirm Password</label>
        <span class="toggle" onclick="toggleConfirmPassword()">👁</span>
    </div>

    <button type="submit" id="registerBtn">Register</button>

    <p class="signup-text">
        Already have an account? <a href="index.html">Login</a>
    </p>
</form>

</div>

<!-- ✅ Message Box -->

<div id="messageBox" class="message-box"></div>

<script>
// Toggle password
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function toggleConfirmPassword() {
    let pass = document.getElementById("confirmPassword");
    pass.type = pass.type === "password" ? "text" : "password";
}

// ✅ Message system
function showMessage(text, type = "success") {
    const box = document.getElementById("messageBox");

    box.innerText = text;
    box.className = "message-box show " + type;

    setTimeout(() => {
        box.classList.remove("show");
    }, 2500);
}

// 🔐 REGISTER FUNCTION
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();
    const button = document.getElementById("registerBtn");

    // validation
    if (!name || !email || !password || !confirmPassword) {
        showMessage("Please fill all fields ❌", "error");
        return;
    }

    if (password !== confirmPassword) {
        showMessage("Passwords do not match ❌", "error");
        return;
    }

    button.innerText = "Registering...";
    button.disabled = true;

    try {
        const response = await fetch("http://127.0.0.1:5000/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: name,
                email: email,
                password: password
            })
        });

        const data = await response.json();

        if (response.ok) {
            showMessage("Registration successful ✅");

            setTimeout(() => {
                window.location.href = "index.html";
            }, 1200);

        } else {
            showMessage(data.message || "Registration failed ❌", "error");
        }

    } catch (error) {
        console.error(error);
        showMessage("Server error ❌", "error");
    }

    button.innerText = "Register";
    button.disabled = false;
});
</script>

</body>
</html>
