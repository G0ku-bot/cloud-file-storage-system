<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Files</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

<!-- Sidebar -->
<div class="sidebar">
    <h2>☁ Cloud</h2>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="upload.html">Upload</a></li>
        <li><a href="#">My Files</a></li>
        <li><a href="#" id="logout">Logout</a></li>
    </ul>
</div>

<!-- Main -->
<div class="main-content">

    <div class="top-bar">
        <h1>My Files 📂</h1>
        <p>View, download and manage your files</p>
    </div>

    <!-- Table -->
    <div class="file-table">
        <table>
            <thead>
                <tr>
                    <th>File Name</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="filesTable"></tbody>
        </table>
    </div>

</div>

</div>

<!-- ✅ Message Box -->

<div id="messageBox" class="message-box"></div>

<script>
// 🔒 Protect page
if (!localStorage.getItem("token")) {
    window.location.href = "index.html";
}

// ✅ Message function
function showMessage(text, type = "success") {
    const box = document.getElementById("messageBox");

    box.innerText = text;
    box.className = "message-box show " + type;

    setTimeout(() => {
        box.classList.remove("show");
    }, 2500);
}

// 🔽 Load files
async function loadFiles() {
    try {
        const response = await fetch("http://127.0.0.1:5000/files", {
            headers: {
                "Authorization": localStorage.getItem("token")
            }
        });

        const files = await response.json();

        const table = document.getElementById("filesTable");
        table.innerHTML = "";

        if (files.length === 0) {
            table.innerHTML = "<tr><td colspan='3'>No files uploaded</td></tr>";
            return;
        }

        files.forEach(file => {
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${file.filename}</td>
                <td>${new Date(file.uploaded_at).toLocaleString()}</td>
                <td>
                    <button onclick="downloadFile('${file.filename}')">Download</button>
                    <button onclick="deleteFile(${file.id})">Delete</button>
                </td>
            `;

            table.appendChild(row);
        });

    } catch (error) {
        console.error(error);
        showMessage("Failed to load files ❌", "error");
    }
}

loadFiles();

// 🔽 Download file
async function downloadFile(filename) {
    try {
        const response = await fetch(`http://127.0.0.1:5000/download/${filename}`, {
            headers: {
                "Authorization": localStorage.getItem("token")
            }
        });

        const data = await response.json();

        if (data.url) {
            window.open(data.url);
            showMessage("Download started ⬇️");
        } else {
            showMessage("Failed to get download link ❌", "error");
        }

    } catch (error) {
        console.error(error);
        showMessage("Download failed ❌", "error");
    }
}

// ❌ Delete file (no confirm popup now)
async function deleteFile(id) {
    try {
        const response = await fetch(`http://127.0.0.1:5000/delete/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": localStorage.getItem("token")
            }
        });

        const data = await response.json();

        showMessage("File deleted 🗑");
        loadFiles();

    } catch (error) {
        console.error(error);
        showMessage("Delete failed ❌", "error");
    }
}

// 🔓 Logout
document.getElementById("logout").addEventListener("click", () => {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "index.html";
});
</script>

</body>
</html>
