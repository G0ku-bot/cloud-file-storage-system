<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Files</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>☁ Cloud</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="#">My Files</a></li>
            <li><a href="index.html" id="logout">Logout</a></li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main-content">

        <div class="top-bar">
            <h1>My Files 📂</h1>
            <p>View, download and manage your files</p>
        </div>

        <!-- Table -->
        <div class="file-table">
            <table>
                <thead>
                    <tr>
                        <th>File Name</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="filesTable">
                </tbody>
            </table>
        </div>

    </div>

</div>

<script>
// 🔒 Redirect if not logged in
if (!localStorage.getItem("token")) {
    window.location.href = "index.html";
}

// 🔽 Load files
async function loadFiles() {
    try {
        const response = await fetch("http://127.0.0.1:5000/files", {
            headers: {
                "Authorization": localStorage.getItem("token")
            }
        });

        const files = await response.json();

        const table = document.getElementById("filesTable");
        table.innerHTML = "";

        if (files.length === 0) {
            table.innerHTML = "<tr><td colspan='3'>No files uploaded</td></tr>";
            return;
        }

        files.forEach(file => {
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${file.filename}</td>
                <td>${new Date(file.uploaded_at).toLocaleString()}</td>
                <td>
                    <button onclick="downloadFile('${file.filename}')">Download</button>
                    <button onclick="deleteFile(${file.id})">Delete</button>
                </td>
            `;

            table.appendChild(row);
        });

    } catch (error) {
        console.error(error);
        alert("Failed to load files");
    }
}

loadFiles();


// 🔽 Download file
async function downloadFile(filename) {
    try {
        const response = await fetch(`http://127.0.0.1:5000/download/${filename}`, {
            method: "GET",
            headers: {
                "Authorization": localStorage.getItem("token")
            }
        });

        const data = await response.json();

        if (data.url) {
            window.open(data.url); // opens secure S3 link
        } else {
            alert("Failed to get download link");
        }

    } catch (error) {
        console.error(error);
        alert("Download failed");
    }
}



// ❌ Delete file
async function deleteFile(id) {
    if (!confirm("Delete this file?")) return;

    try {
        const response = await fetch(`http://127.0.0.1:5000/delete/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": localStorage.getItem("token")
            }
        });

        const data = await response.json();

        alert(data.message);
        loadFiles();

    } catch (error) {
        console.error(error);
        alert("Delete failed");
    }
}


// 🔓 Logout
document.getElementById("logout").addEventListener("click", () => {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "index.html";
});
</script>

</body>
</html>
