<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>☁ Cloud</h2>
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="files.html">My Files</a></li>
            <li><a href="index.html">Logout</a></li>
        </ul>
    </div>

    <div class="main-content">

    <div class="top-bar">
        <h1>Welcome </h1>
        <p>Your cloud storage dashboard</p>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-box">
            <h3>12</h3>
            <p>Total Files</p>
        </div>

        <div class="stat-box">
            <h3>1.5GB</h3>
            <p>Storage Used</p>
        </div>

        <div class="stat-box">
            <h3>5</h3>
            <p>Uploads Today</p>
        </div>
    </div>

    <!-- Actions -->
    <div class="cards">
        <div class="card">
            <h3>Upload Files</h3>
            <p>Add files to your cloud storage</p>
            <a href="upload.html">Open</a>
        </div>

        <div class="card">
            <h3>My Files</h3>
            <p>Manage your stored files</p>
            <a href="files.html">Open</a>
        </div>

        <div class="card">
            <h3>Storage Info</h3>
            <p>Check your usage and limits</p>
            <a href="#">View</a>
        </div>
    </div>

</div>

</div>

</body>
</html>
