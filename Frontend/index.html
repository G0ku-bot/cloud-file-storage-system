<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Cloud Storage</title>
    <link rel="stylesheet" href="css/style.css">


<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


</head>
<body class="auth-page">

<div class="background">
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<div class="login-box">
    <h2>Welcome Back</h2>
    <p>Login to your cloud storage</p>


<form id="loginForm">
    <div class="input-box">
        <input type="email" id="email" required placeholder=" ">
        <label>Email</label>
    </div>

    <div class="input-box">
        <input type="password" id="loginPassword" required placeholder=" ">
        <label>Password</label>
        <span class="toggle" onclick="toggleLoginPassword()">👁</span>
    </div>

    <button type="submit">Login</button>

    <p class="signup-text">
        Dont have an account? <a href="register.html">Register</a>
    </p>
</form>


</div>

<div id="messageBox" class="message-box"></div>

<script>
function toggleLoginPassword() {
    let pass = document.getElementById("loginPassword");
    pass.type = pass.type === "password" ? "text" : "password";
}

function showMessage(text, type = "success") {
    const box = document.getElementById("messageBox");

    box.innerText = text;
    box.className = "message-box show " + type;

    setTimeout(() => {
        box.classList.remove("show");
    }, 2500);
}

document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("loginPassword").value;

    try {
        const response = await fetch("http://127.0.0.1:5000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem("user", JSON.stringify(data.user));
            localStorage.setItem("token", data.token);

            showMessage("Login successful ✅");

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);

        } else {
            showMessage(data.message || "Login failed ❌", "error");
        }

    } catch (error) {
        console.error(error);
        showMessage("Server error ❌", "error");
    }
});
</script>

</body>
</html>
